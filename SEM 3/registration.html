<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="/SEM 2/ecommerce/ecommerce/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>
<body>
    <header> <!-- Seccion de NavBar de la pagina-->
        <div class="max-w-7xl mx-4 md:mx-auto py-6 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between hover"> <!-- Logotipo de la pagina -->
                <a href="/SEM 2/ecommerce/ecommerce/index.html">
                    <h1 class="font-bold text-2xl">
                        Brea's Styles
                    </h1>
                </a>
                <div class="hidden md:block">
                    <ul class="flex font-semibold items-center gap-6"> <!-- Menu de navegacion -->
                        <a href="">
                            <li class="highlight">
                                Shop
                            </li>
                        </a>
                        <a href="">
                            <li class="highlight">
                                Promotions
                            </li>
                        </a>
                        <a href="">
                            <li class="highlight">
                                New Arrival
                            </li>
                        </a>
                        <a href="">
                            <li class="highlight">
                                Brands
                            </li>
                        </a>
                    </ul>
                </div>
                <div class="flex items-center gap-4"> <!-- Buscador y link al carrito de compras y pagina de inicio de sesion -->
                    <input class="bg-gray-100/50 hidden md:inline border border-gray-300 rounded-md shadow-md p-1 text-gray" type="search" name="" placeholder="Search..." id="">
                    <a href="">
                        <i class="fa-solid fa-cart-shopping zoom"></i>
                    </a>
                    <a href="">
                        <i class="fa-regular fa-user zoom"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>
    <section class="flex items-center justify-center min-h-screen bg-gray-100"> <!-- Registro de usuario -->
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h2 class="text-2xl font-bold text-center text-gray-700 mb-6">Sign Up</h2>
            <form action="" method="post" class="space-y-4">
                <div>
                    <label for="fname" class="block text-sm font-medium text-gray-600">First name</label>
                    <input type="text" id="fname" name="fname" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-fname">First name cannot contain numbers.</p>
                </div>
                <div>
                    <label for="lname" class="block text-sm font-medium text-gray-600">Last name</label>
                    <input type="text" id="lname" name="lname" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-lname">Last name cannot contain numbers.</p>
                </div>
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-600">Username</label>
                    <input type="text" id="username" name="username" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-username">Please enter a valid username.</p>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
                    <input type="email" id="email" name="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-email">Please enter a valid email.</p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
                    <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-password">Password must be at least 6 characters long.</p>
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-600">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-red-500 text-sm mt-1 hidden" id="error-confirm-password">Passwords do not match.</p>
                </div>
                <div>
                    <input type="submit" value="Submit" class="w-full bg-black text-white font-semibold py-2 rounded-lg hover:bg-gray-900 cursor-pointer">
                </div>
            </form>
        </div>
    </section>
</body>
        <script src="/SEM 3/formscript.js"> </script>

</html>
